name: Preview Validation

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:
  preview-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate
        run: |
          pnpm check
          pnpm test
          pnpm build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v6
        with:
          name: trendsetter-ai-preview-dist
          path: dist
          if-no-files-found: error
